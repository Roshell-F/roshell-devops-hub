<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>DevOps Control Panel</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <h1>DevOps Control Panel</h1>

  <div class="grid">
    <div class="card" id="status"></div>
    <div class="card" id="uptime"></div>
    <div class="card" id="requests"></div>
    <div class="card" id="time"></div>
  </div>

  <h2>Métricas</h2>

  <div class="metrics">
    <div>
      CPU
      <div class="bar"><div id="cpu-bar"></div></div>
    </div>

    <div>
      RAM
      <div class="bar"><div id="ram-bar"></div></div>
    </div>
  </div>

  <h2>Logs</h2>
  <div id="logs" class="logs"></div>
</div>

<script>
function log(message) {
  const logs = document.getElementById('logs');
  const time = new Date().toLocaleTimeString();
  logs.innerHTML = `[${time}] ${message}<br>` + logs.innerHTML;
}

async function loadData() {
  const res = await fetch('/api/status');
  const data = await res.json();

  document.getElementById('status').innerText = "Status: " + data.status;
  document.getElementById('uptime').innerText = "Uptime: " + data.uptime.toFixed(1) + "s";
  document.getElementById('requests').innerText = "Requests: " + data.requests;
  document.getElementById('time').innerText = "Time: " + data.time;

  document.getElementById('cpu-bar').style.width = data.cpu + "%";
  document.getElementById('cpu-bar').innerText = data.cpu + "%";

  document.getElementById('ram-bar').style.width = data.memory + "%";
  document.getElementById('ram-bar').innerText = data.memory + "%";

  log("Sistema actualizado correctamente");
}

setInterval(loadData, 3000);
loadData();
</script>

</body>
</html>
